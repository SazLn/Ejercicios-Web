<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../Archivos CSS/Tarjetas_responsivas.css">
    <title>Tarjetas responsivas con grid</title>
</head>
<body>
    <!-- Hacer tarjetas responsivas con CSS Grid. -->
     <section class="contenedor-grid">

        <article class="tarjeta">
            <span class="icono">🚀</span>
            <h3>Título tarjeta</h3>
            <p>Descripción</p>
        </article>

        <article class="tarjeta">
            <span class="icono">⚡</span>
            <h3>Título tarjeta</h3>
            <p>Descripción</p>
        </article>
        
        <article class="tarjeta">
            <span class="icono">🎨</span>
            <h3>Título tarjeta</h3>
            <p>Descripción</p>
        </article>

        <article class="tarjeta">
            <span class="icono">🌟</span>
            <h3>Título tarjeta</h3>
            <p>Descripción</p>
        </article>
        
     </section>
</body>
</html>
