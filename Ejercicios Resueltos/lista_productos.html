<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen p-6">
    
    <!-- Contenedor principal -->
   <div class="max-w-2xl mx-auto">

        <!-- Titulo y descripcion -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">📦 Inventario Alpha</h1>
            <p class="text-slate-500">Gestión eficiente de DOM usando Delegación de Eventos.</p>
        </header>

        <!-- formulario para ingresar el producto -->
        <form id="form-producto" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex gap-4 mb-8">
            
            <!-- Entrada de texto para anadir un producto -->
            <input 
                type="text" 
                id="input-producto" 
                placeholder="Ej. Teclado Mecánico..." 
                required 
                oninvalid="this.setCustomValidity('Por favor, ingresa tu nombre para continuar.')"
                
                class="flex-1 bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow"
            >


            <button
                type="submit" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2 rounded-lg transition-colors shadow-sm"
            >
                Añadir
            </button>

        </form>

        <!-- Contenedor de productos -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            
            
            <div class="bg-slate-100 px-6 py-3 border-b border-slate-200 font-semibold text-slate-600 text-sm uppercase tracking-wider">
                Lista de Productos
            </div>

            <!-- Lista de productos -->
            <ul id="lista-inventario" class="divide-y divide-slate-100">
                </ul>
        </div>
    </div>
    <script src="lista_productos.js"></script>
</body>
</html>
