<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOutDown {
        from { opacity: 1; transform: translateY(0); }
        to   { opacity: 0; transform: translateY(12px); }
    }
    @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
    }
    .anim-fade-in  { animation: fadeInUp  0.25s ease-out both; }
    .anim-fade-out { animation: fadeOutDown 0.2s ease-in both; }
    .anim-scale-in { animation: scaleIn 0.3s ease-out both; }
</style>

</head>
<body class="bg-slate-100 text-slate-800 font-sans p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <main class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm">
            <h1 class="text-2xl font-bold text-indigo-600 mb-6">💻 Tech Store</h1>

            <!-- Catalogo de productos -->
            <div id="contenedor-catalogo" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </main>


        <!-- Carrito -->
        <aside class="bg-white p-6 rounded-xl shadow-sm h-fit sticky top-8">
            <h2 class="text-xl font-bold text-slate-700 mb-4 flex justify-between">
                🛒 Carrito <span id="total-carrito" class="text-indigo-600">$0</span>
            </h2>
            
            <ul id="contenedor-carrito" class="divide-y divide-slate-200">
                <li class="py-4 text-sm text-slate-500 italic text-center">El carrito está vacío</li>
            </ul>

            <button id="boton-pagar" style="display: none;" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors duration-200 shadow-sm">
                💳 Pagar
            </button>
        </aside>

    </div>

    <script type="module" src="simulador_carrito JS's/main.js"></script>
    
</body>
</html>
